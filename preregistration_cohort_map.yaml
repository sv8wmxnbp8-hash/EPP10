  handling:         "retained (PACE/mFACEs tolerate irregular sampling by design)"

# ----------------------------------------------------------------------------
# Hormone variability priors (literature-based CV) — CRITICAL for pseudo-IPD
# ----------------------------------------------------------------------------
# The master CSV provides only cohort means, not SD/SEM. Pseudo-IPD GP draws
# (v10.0 §4.2) require σ² = (CV × mean)². CV priors below are compiled from
# analytical+biological variability in published sources. Conservative (upper-
# bound typical) values selected to avoid under-estimating uncertainty.

hormone_variability_priors:
  # Total ghrelin — high biological CV; Callahan et al. 2004 JCEM 89(4):1630–1635
  ghrelin_total:
    cv:       0.40
    source:   "Callahan et al. JCEM 2004; intra-subject CV 30–45% across fast/postprandial states"
    note:     "Fundectomy (SG) reduces absolute level ~75% but CV proportionally preserved"

  # Acylated ghrelin — CV slightly higher due to acyl instability
  ghrelin_acyl:
    cv:       0.45
    source:   "Yoshimoto et al. J Clin Endocrinol Metab 2002; ghrelin assay inter-lab CV up to 40–50%"

  # Total GIP — moderate CV; Nauck et al. Diabetes 1986; Bagger et al. JCEM 2011
  GIP_total:
    cv:       0.30
    source:   "Bagger et al. JCEM 2011 96(3):847–855; Nauck et al. 1986"

  # Active GIP (intact 1-42) — higher CV due to DPP-4 cleavage kinetics
  GIP_active:
    cv:       0.35
    source:   "Deacon et al. Diabetes 2000; intact GIP assay CV 30–40%"

  # Total GLP-1 — Vilsbøll et al. JCEM 2003; moderate CV
  GLP1_total:
    cv:       0.35
    source:   "Vilsbøll et al. JCEM 2003 88(6):2706–2713; RIA inter-assay CV 30–40%"

  # Active GLP-1 (7-36 amide) — higher CV (short half-life, DPP-4 cleavage)
  GLP1_active:
    cv:       0.40
    source:   "Orskov et al. Diabetes 1994; active GLP-1 inter-study CV 35–45%"

  # Total PYY — Batterham et al. Nature 2002; moderate CV
  PYY_total:
    cv:       0.35
    source:   "Batterham et al. Nature 2002; Pedersen et al. J Clin Endocrinol Metab 2006"

  # PYY 3-36 — DPP-4 product; higher CV
  PYY_3_36:
    cv:       0.40
    source:   "Batterham et al. NEJM 2003 349:941–948; inter-lab CV 35–45%"

  # Glucagon — Holst et al.; Lund et al. 2011; moderate CV
  glucagon:
    cv:       0.30
    source:   "Lund et al. Diabetologia 2011 54(6):1379–1385; sandwich ELISA CV 25–35%"

  # Insulin — one of the best-characterized; CV 10–20% in plasma
  insulin:
    cv:       0.20
    source:   "Heinemann Diabetes Technol Ther 2002 4(5):673–682; analytical CV 8–15%, biological 15–25%"

  # Glucose — lowest CV; tight physiologic control
  glucose:
    cv:       0.12
    source:   "ADA guidelines 2021; plasma glucose analytical CV 3–5%, biological 10–15%"

# ----------------------------------------------------------------------------
# Metadata columns propagated to long format
# ----------------------------------------------------------------------------
metadata_columns:
  - source_cohort
  - cohort_v10_primary
  - cohort_v10_sensitivity
