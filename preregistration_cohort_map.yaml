  sensitivity: "pseudo-IPD via GP draws (v10.0 §4.2)"
  not_applicable: "subject-level IPD (no real IPD in this dataset)"

pseudo_ipd:
  method:          "GP(μ_cohort(t), K_ρ(s,t)) with AR(1) temporal kernel"
  M_draws:         1000
  rho_grid:        [0.3, 0.5, 0.7, 0.9]
  rho_rationale:   "v10.0 §4.2 pre-specifies this grid to span weak (0.3) to strong (0.9) temporal autocorrelation. All four are reported; primary rho for score estimation = 0.5."
  sigma2_source:   "CV priors × cohort mean² (see hormone_variability_priors below) — no SD/SEM available in source master"
  seed:            20260422

# ----------------------------------------------------------------------------
# D1 — Pre-surgery pooling (frozen 2026-04-22)
# ----------------------------------------------------------------------------
pre_surgery_pooling:
  rule: "Pre-surgery cohorts pooled into v10.0 canonical cohort."
  captured_metadata: "surgery_status ∈ {pre_surgery, post_surgery, not_applicable}"
  affected_labels: 8

# ----------------------------------------------------------------------------
# D2 — Post-bariatric T2DM pre-surgery status (frozen 2026-04-22)
# ----------------------------------------------------------------------------
post_bariatric_t2dm_flag:
  rule: "SG/RYGBP pool by modality; pre-surgery T2DM captured as metadata."
  variable: "had_t2dm_pre_surgery"
  values:   ["TRUE", "FALSE", "unknown"]
  inference_rule:
    TRUE:    "source label explicitly mentions T2DM"
    FALSE:   "source label explicitly says No T2DM / without T2DM / non-diabetic"
    unknown: "source label silent on T2DM status — do not impute"
  observed_distribution_in_post_bariatric:
    SG:    "TRUE=2, FALSE=0, unknown=5"
    RYGBP: "TRUE=4, FALSE=0, unknown=6"

