# ----------------------------------------------------------------------------
commitments:
  - "Any change to these rules after the frozen_date is a protocol deviation — log with timestamp and justification in Methods Addendum."
  - "The CV priors above are upper-bound typical values from published sources; if more precise CVs become available per-hormone per-cohort, the sensitivity analysis is re-run with updated priors and BOTH sets of results are reported."
  - "The normalization map is distributed as cohort_normalization_map.csv, archived alongside the YAML in OSF."
  - "Compliance tick-sheet (Suplementario S2) audits every source label appears in the map with non-NA cohort_v10_primary."

