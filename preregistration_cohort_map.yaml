# ----------------------------------------------------------------------------
# Classifier operational spec (frozen 2026-04-22)
# ----------------------------------------------------------------------------
classifier_spec:
  primary:
    rule:      "Apply classify_by_scores on z-scores of the first 3 retained mFPC components (z[, 1:3])"
    rationale: "Matches YAML v10.0 spec 'Los tres primeros scores multivariados ξ1, ξ2, ξ3'. Using all K_retained PCs inflates Altered prevalence via multiple-testing on the '|z|>2 in ≥2 axes' rule."
  precedence:
    order: ["Altered", "Blunted", "Enhanced", "Impaired", "Impairment_limitrofe", "Preservado"]
    rule_description: "First matching rule in this order assigns the class; multi-axis extremes outrank single-axis; extremes outrank amplitude-only classes."
  incretin_axis_rule: "argmax over first 3 retained PCs of integrated squared loading on {GIP, GLP-1, PYY} forms; loading < 0.50 flagged as warning (not fail)"
  sensitivity:
    rule:      "Run classifier additionally on all K_retained PCs for transparency"
    reporting: "Report both primary (3-PC) and sensitivity (all-K) prevalence tables in Supplementary"
  chiou_normalization:
    required: true
    rationale: "Without Chiou normalization, ghrelin/insulin absolute variance dominates PC1-2 and incretin axis has near-zero loading. Chiou equalizes contributions via 1/√v_h per hormone. Primary fit uses chiou_normalize=TRUE."
