  affected_labels: 6
  weight_loss_modality_values: ["none", "RYGB", "SG", "caloric_restriction"]
  note: "These 6 CR labels are counted inside Obesity=17 in cohort_v10_primary. They can be isolated via weight_loss_modality == 'caloric_restriction' OR cohort_v10_sensitivity == 'caloric_restriction_post'."

